<body class="contact-page">
  <header>
    <div class="menu_bar">
      <div class="menu_top">
        <ul>

      <nav id="nav">
        <ul>
          <li><a href="index.html">Home</a></li>

          <li><a href="contact.html">Contact</a></li>

  <main>
    <div class="haikei">
      <div class="wave">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
          <path fill="#ffe970" fill-opacity="1"
            d="M0,192L60,176C120,160,240,128,360,144C480,160,600,224,720,245.3C840,267,960,245,1080,202.7C1200,160,1320,96,1380,64L1440,32L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z">
          </path>
        </svg>
      </div>
    </div>
    <div class="page-title">
      <h2>Contact</h2>
      <p>お問い合わせ</p>
    </div>

    <section class="contact-link">
      <form>
        <label for="name"><span class="en">Name</span> お名前</label>
        <input type="text" id="name" name="user_name" />
        <label for="email"><span class="en">Email</span>メールアドレス</label>
        <input type="email" id="email" name="user_email" />
        <label for="tel"><span class="en">Phone</span>電話番号</label>
        <input type="tel" id="tel" name="user_tel" />
        <label for="message"><span class="en">Message</span>お問い合わせ内容</label>
        <textarea id="message" name="user_message"></textarea>
        <button type="submit">Submit</button>
      </form>

      <div class="wave">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
          <path fill="#ffb11b" fill-opacity="1"
            d="M0,64L120,80C240,96,480,128,720,133.3C960,139,1200,117,1320,106.7L1440,96L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z">
          </path>
        </svg>
      </div>
    </section>
  </main>

      <div class="logo">
        <img src="images/icon.png" alt="TACO KING" />
